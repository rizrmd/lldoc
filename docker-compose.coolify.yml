services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_CHAT_MODEL: microsoft/phi-3.5-mini-instruct
      NVIDIA_CHAT_MAX_TOKENS: 1024
      TOP_K: 8
      RAG_CONTEXT_CHARS_PER_CHUNK: 1200
      RAG_CONTEXT_MAX_CHARS: 6000
      APP_DATA_DIR: /app/data
      CORS_ORIGINS: ${CORS_ORIGINS:-https://aidoc.avolut.com}
    volumes:
      - app_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_APP_PASSWORD: "${VITE_APP_PASSWORD:-rahasiakita123}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  qdrant_storage:
  app_data:
